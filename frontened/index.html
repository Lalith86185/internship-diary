<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Internship Diary Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Internship Diary Generator</h1>
            <p>Generate professional work summaries in seconds.</p>
        </header>

        <div class="input-section">
            <div class="field">
                <label for="start">Start Date:</label>
                <input type="date" id="start">
            </div>

            <div class="field">
                <label for="end">End Date:</label>
                <input type="date" id="end">
            </div>

            <div class="field">
                <label>Select Skills:</label>
                <div class="skill-suggestions">
                    <button onclick="addSkill('HTML5')">HTML5</button>
                    <button onclick="addSkill('CSS3')">CSS3</button>
                    <button onclick="addSkill('JavaScript')">JavaScript</button>
                    <button onclick="addSkill('React.js')">React.js</button>
                    <button onclick="addSkill('Node.js')">Node.js</button>
                </div>
                <div id="pillsContainer" class="pills-container"></div>
            </div>

            <button class="generate-btn" onclick="generate()">
                Generate Professional Diary
            </button>
        </div>

        <hr>

        <div id="output" class="output-area">
            <p style="text-align: center; color: #888;">Your generated diary will appear here...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
